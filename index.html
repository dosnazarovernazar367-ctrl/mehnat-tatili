<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mehnat Ta'tili Hisoblash</title>

<style>
body {
font-family: Arial;
background:#f5f7fa;
margin:0;
}

.container {
max-width:600px;
margin:40px auto;
background:#fff;
padding:20px;
border-radius:10px;
}

.form-group {
margin-bottom:20px;
}

label {
display:block;
font-weight:bold;
margin-bottom:6px;
}

input, select {
width:100%;
padding:10px;
margin-top:6px;
box-sizing:border-box;
}

button {
padding:10px 20px;
margin-top:10px;
cursor:pointer;
}

small {color:gray;}
</style>
</head>

<body>

<div class="container">

<p><b>Mehnat ta’tilidan keyin ishga chiqish sanasini hisoblash tizimi</b></p>

<!-- TASHKILOT -->
<div class="form-group">
<label>Tashkilotni tanlang 👇</label>
<input list="orgs" placeholder="Tanlang">

<datalist id="orgs">
<option value="Davlat umumiy oʻrta taʼlim maktablari">
<option value="Davlat maktabgacha taʼlim tashkilotlari">
<option value="Maktabgacha va maktab ta’lim bo‘limi">
<option value="Madaniyat bo‘limi">
<option value="Tibbiyot birlashmasi">
<option value="Soliq inspeksiyasi">
<option value="Yoshlar ishlari agentligi bo‘limi">
<option value="Boshqa">
</datalist>
</div>

<!-- HUDUD -->
<div class="form-group">
<label>Hududni tanlang 👇</label>
<select id="region" onchange="loadDistricts()">
<option value="">Tanlang</option>
<option value="qq">Qoraqalpogʻiston Respublikasi</option>
<option value="navoiy">Navoiy viloyati</option>
<option value="buxoro">Buxoro viloyati</option>
<option value="namangan">Namangan viloyati</option>
<option value="qashqa">Qashqadaryo viloyati</option>
<option value="boshqa">Boshqa</option>
</select>
</div>

<!-- TUMAN -->
<div class="form-group">
<label>Shahar (tuman)ni tanlang 👇</label>
<select id="district"></select>
<small id="hint"></small>
</div>

<!-- KUN -->
<div class="form-group">
<label>Ta’til miqdorini kiriting</label>
<input type="number" id="days">
</div>

<!-- SANA -->
<div class="form-group">
<label>Ta’til boshlanish sanasi</label>
<input type="date" id="date">
</div>

<button onclick="calc()">Hisoblash</button>

<h3 id="res"></h3>

</div>

<script>

const districts = {
qq: [
"Moʻynoq tumani","Moʻynoq shahri","Qoʻngʻirot tumani","Boʻzatov tumani",
"Qoraoʻzak tumani","Kegeyli tumani","Qonlikoʻl tumani","Nukus tumani",
"Taxtakoʻpir tumani","Chimboy tumani","Shumanoy tumani","Qoʻngʻirot shahri"
],
navoiy: [
"Uchquduq shahri","Zarafshon shahri","Tomdi tumani","Uchquduq tumani",
"Konimex tumani","Qiziltepa tumani","Navbahor tumani","Nurota tumani",
"Xatirchi tumani","Karmana tumani","Navoiy shahri"
],
buxoro: [
"Qorovulbozor tumani","Gazli shahri","Olot tumani","Qorakoʻl tumani"
],
namangan: [
"Pop tumani","Chorkesar shaharchasi"
],
qashqa: [
"Muborak tumani"
]
};

function loadDistricts(){

let region = document.getElementById("region").value;
let district = document.getElementById("district");
let hint = document.getElementById("hint");

// reset TO‘G‘RI
district.innerHTML = "";
hint.innerText = "";

// BOSHQA
if(region === "boshqa"){
district.disabled = true;
hint.innerText = "Bu maydonni to‘ldirish shart emas. Keyingi maydonga o‘ting.";
return;
}

district.disabled = false;

// default option
let defaultOpt = document.createElement("option");
defaultOpt.value = "";
defaultOpt.textContent = "Tanlang";
defaultOpt.selected = true;
defaultOpt.disabled = true;
district.appendChild(defaultOpt);

// fill
if(districts[region]){
districts[region].forEach(d=>{
let opt = document.createElement("option");
opt.value = d;
opt.textContent = d;
district.appendChild(opt);
});
}
}

function calc(){

let d = document.getElementById('date').value;
let days = parseInt(document.getElementById('days').value);

if(!d){
alert("Sanani tanlang");
return;
}

if(isNaN(days)){
alert("Ta’til miqdorini kiriting");
return;
}

let dt = new Date(d);
dt.setDate(dt.getDate() + days);

document.getElementById('res').innerText =
"Ishga chiqish sanasi: " + dt.toLocaleDateString('uz-UZ');
}

</script>

</body>
</html>
