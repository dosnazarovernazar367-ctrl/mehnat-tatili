<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mehnat Ta'tili Hisoblash</title>
<style>
body {font-family: Arial; background:#f5f7fa; margin:0;}
.container {max-width:600px; margin:50px auto; background:#fff; padding:20px; border-radius:10px;}
.center {text-align:center;}
.hidden {display:none;}
button {padding:10px 20px; margin:10px;}
input, select {width:100%; padding:10px; margin-top:10px;}
</style>
</head>
<body>

<div id="splash" class="container center">
<h2>LOGO</h2>
<p>Qanlıkól rayonı ádillik bolimi bas máslahatshisi<br>Yusupov Ernazar tárepinen islep shıǵıldı</p>
</div>

<div id="language" class="container center hidden">
<h3>Tilni tanlang</h3>
<button onclick="startUz()">Oʻzbek tili</button>
<button>Qaraqalpaq tili</button>
</div>

<div id="main" class="container hidden">
<p><b>Maskur sayt davlat tashkilotlari xodimlaring mehnat ta’tilidan qachon ishga chiqishini aniqlash uchun ishlab chiqilgan</b></p>

<label>Tashkilotni tanlang</label>
<input list="orgs">
<datalist id="orgs">
<option value="1">
<option value="2">
<option value="3">
<option value="4">
<option value="5">
</datalist>

<label>Shahar(tuman)ni tanglang</label>
<select>
<option>a</option>
<option>b</option>
<option>g</option>
<option>d</option>
</select>

<label>Bu yerga mehnat ta’tilingiz nechta kundan iboratligini yozing</label>
<input type="number" value="30">

<label>Ta’til boshlanish sanasi</label>
<input type="date" id="date" min="2026-01-01" max="2027-12-31">

<button onclick="calc()">Hisoblash</button>

<h3 id="res"></h3>
<p id="txt"></p>
</div>

<script>
setTimeout(()=>{
document.getElementById('splash').classList.add('hidden');
document.getElementById('language').classList.remove('hidden');
},2000);

function startUz(){
document.getElementById('language').classList.add('hidden');
document.getElementById('main').classList.remove('hidden');
}

function calc(){
let d=document.getElementById('date').value;
if(!d){alert('Sanani tanlang');return;}
let dt=new Date(d);
dt.setDate(dt.getDate()+30);
document.getElementById('res').innerText=dt.toISOString().split('T')[0];
document.getElementById('txt').innerText="Shu sanada ishga chiqishingiz kerak";
}
</script>

</body>
</html>
