<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mehnat Ta'tili Hisoblash</title>

<style>
body {font-family: Arial; background:#f5f7fa; margin:0;}
.container {max-width:600px; margin:40px auto; background:#fff; padding:20px; border-radius:10px;}
.form-group {margin-bottom:18px;}
label {font-weight:bold;}
input, select {width:100%; padding:10px; margin-top:5px;}
button {padding:12px; width:100%; margin-top:10px; cursor:pointer;}
</style>
</head>

<body>

<div class="container">

<h3>Mehnat ta’tili hisoblash</h3>

<div class="form-group">
<label>Tashkilot 👇</label>
<select id="org">
<option value="">Tanlang</option>
<option value="5">Tibbiyot birlashmasi</option>
<option value="6">Davlat umumiy oʻrta taʼlim maktablari</option>
<option value="6">Davlat o‘rmon xo‘jaligi</option>
<option value="5">Soliq inspeksiyasi</option>
</select>
</div>

<div class="form-group">
<label>Hudud 👇</label>
<select id="region" onchange="loadDistricts()">
<option value="">Tanlang</option>
<option value="qq">Qoraqalpogʻiston</option>
<option value="navoiy">Navoiy</option>
<option value="buxoro">Buxoro</option>
<option value="namangan">Namangan</option>
<option value="qashqa">Qashqadaryo</option>
<option value="boshqa">Boshqa</option>
</select>
</div>

<div class="form-group">
<label>Tuman / shahar 👇</label>
<select id="district">
<option value="">Tanlang</option>
</select>
</div>

<div class="form-group">
<label>Ta’til kunlari</label>
<input type="number" id="days">
</div>

<div class="form-group">
<label>Boshlanish sanasi</label>
<input type="date" id="date">
</div>

<button onclick="calc()">Hisoblash</button>

<h3 id="res"></h3>

</div>

<script>

// BONUS
const bonus = {
"Moʻynoq tumani":3,
"Qoʻngʻirot tumani":3,
"Boʻzatov tumani":3,
"Qoraoʻzak tumani":2,
"Nukus tumani":2,
"Taxiatosh tumani":1,
"Uchquduk shahri":6,
"Zarafshon shahri":6,
"Tomdi tumani":5,
"Qiziltepa tumani":3,
"Karmana tumani":2,
"Navoiy shahri":2,
"Muborak tumani":2
};

// DISTRICTS
const districts = {
qq:["Moʻynoq tumani","Qoʻngʻirot tumani","Boʻzatov tumani","Qoraoʻzak tumani","Nukus tumani","Taxiatosh tumani","Boshqa"],
navoiy:["Uchquduk shahri","Zarafshon shahri","Tomdi tumani","Qiziltepa tumani","Karmana tumani","Navoiy shahri","Boshqa"],
buxoro:["Qorovulbozor tumani","Olot tumani","Qorakoʻl tumani","Boshqa"],
namangan:["Pop tumani","Boshqa"],
qashqa:["Muborak tumani","Boshqa"]
};

// LOAD DISTRICTS
function loadDistricts(){

let r = document.getElementById("region").value;
let d = document.getElementById("district");

d.innerHTML = "";

if(!r){
d.disabled = true;
return;
}

d.disabled = false;

let first = document.createElement("option");
first.text = "Tanlang";
first.disabled = true;
first.selected = true;
d.appendChild(first);

districts[r].forEach(x=>{
let o = document.createElement("option");
o.value = x;
o.textContent = x;
d.appendChild(o);
});
}

// CALC
function calc(){

let days = parseInt(document.getElementById("days").value);
let start = new Date(document.getElementById("date").value);
let workType = parseInt(document.getElementById("org").value);
let district = document.getElementById("district").value;

if(!days || !start){
alert("Ma’lumot kiriting");
return;
}

let b = bonus[district] || 0;
let normal = days - b;

let dt = new Date(start);

// oddiy kun
for(let i=0;i<normal;i++){
dt.setDate(dt.getDate()+1);
}

// bonus kun
let added = 0;
while(added < b){

dt.setDate(dt.getDate()+1);

let day = dt.getDay();

if(workType == 6){
if(day !== 0) added++;
}else{
if(day !== 0 && day !== 6) added++;
}

}

// ishga chiqish
dt.setDate(dt.getDate()+1);

while(true){

let day = dt.getDay();

if(workType == 6 && day !== 0) break;
if(workType == 5 && day !== 0 && day !== 6) break;

dt.setDate(dt.getDate()+1);
}

// format
let m = ["yanvar","fevral","mart","aprel","may","iyun","iyul","avgust","sentabr","oktabr","noyabr","dekabr"];

let result = ${dt.getFullYear()}-yil ${dt.getDate()}-${m[dt.getMonth()]};
  document.getElementById("res").innerText =
"Ishga chiqish sanasi: " + result;

}

</script>

</body>
</html>
